services:
  vault:
    image: hashicorp/vault:latest
    container_name: basicjira-vault

    ports:
      - "8200:8200"

    environment:
      VAULT_DEV_ROOT_TOKEN_ID: basicjira-root-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://127.0.0.1:8200"

    cap_add:
      - IPC_LOCK

    command: server -dev
    restart: unless-stopped